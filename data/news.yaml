# add new items here to include recent news items
# the news get re-ordered, so does not matter where you add entries. For sanity reasons, let's add new items at the end.
item:
  - date: '2020-10-06'
    description: '[Andrei](../authors/ma-rizoiu/) gave an [interview on the Panorama radio show](http://syn.org.au/news-talks-11-boom-misinformation-across-social-media/) about the ways misinformation spreads through social media and how it affects consumers. Panorama is the flagship news and current affairs show of the youth-run SYN Media, broadcasting from Melbourne.'
  - date: '2020-11-26'
    description: '[Nik](../authors/nik-dawson/) (and [Andrei](../authors/ma-rizoiu/)) gave an invited talk at the [Reserve Bank of Australia](https://www.rba.gov.au/) on career transitions and managing labour supply and demand.'
  - date: '2020-08-01'
    description: " :page_facing_up: [Quyu](../authors/quyu-kong/) will present his paper [Describing and Predicting Online Items with Reshare Cascades via Dual Mixture Self-exciting Processes](https://arxiv.org/abs/2001.11132) at [CIKM 2020](https://www.cikm2020.org/). Congrats Quyu!"
  - date: '2020-07-01'
    description: " :smile: Behavioral Data Science's website is up!"  
  - date: '2020-09-28'
    description: "[Andrei](../authors/ma-rizoiu/) won the PitchFest organised by the [NSW Smart Sensing Network](https://www.nssn.org.au/) and [Klarrio](https://klarrio.com/) with an idea of detection of disinformation campaigns in social media. Next, developing a prototype with Klarrio."
  - date: '2020-10-01'
    description: "[Dima Galat](../authors/dima-galat/) joins the group. He will be undertaking his PhD research on cognitive bias detection from text, with an application to detecting and countering mis- and dis-information. Welcome Dima!" 
  - date: '2020-11-03'
    description: " :page_facing_up: [Nik](../authors/nik-dawson/) will present his paper [Predicting Skill Shortages in Labor Markets: A Machine Learning Approach](http://arxiv.org/abs/2004.01311) at the [Workshop on Human-in-the-Loop Methods and Future of Work in BigData -- HMData'20](https://humanmachinedata.org/) collocated with [BigData'20](https://bigdataieee.org/BigData2020/). Congrats Nik!" 
  - date: '2020-12-01'
    description: " :page_facing_up: Two demo papers accepted for WSDM'21! [Rohit](../authors/rohit-ram/) and [Quyu](../authors/quyu-kong/), each had a demo paper accepted for presentation, describing their libraries BirdSpotter and [evently](/softwaretool/evently/), respectively. Congrats!" 
  - date: '2021-01-19'
    description: " :page_facing_up: [Nik](../authors/nik-dawson/)'s and [Andrei](../authors/ma-rizoiu/)'s paper [Layoffs, Inequity and COVID-19: A Longitudinal Study of the Journalism Jobs Crisis in Australia from 2012 to 2020](https://arxiv.org/abs/2008.12459) (together with [Sasha Molitorisz](https://profiles.uts.edu.au/Sacha.Molitorisz) and [Peter Fray](https://www.crikey.com.au/author/peter-fray/)) just got accepted in the prestigious journal _[Journalism](https://journals.sagepub.com/home/jou)_."
  - date: '2021-01-24'
    description: " :page_facing_up: [Andrei](../authors/ma-rizoiu/)'s paper [Linking User Opinion Dynamics and Online Discussions](https://arxiv.org/abs/2101.09852) (together with French collaborators [Christine Largeron](https://perso.univ-st-etienne.fr/largeron/) and Andrei Mardale) just got accepted in [IDA'21](https://ida2021.org/). Check out its [presentation video](https://youtu.be/DPy3l0RdgPM)." 
  - date: '2021-01-22'
    description: " [Nik](../authors/nik-dawson/) just submitted his PhD thesis today! This is the completion of a great journey. Congrats!" 
  - date: '2021-02-11'
    description: "Check our videos for demonstrating the tools, [Birdspotter](https://www.youtube.com/watch?v=52HwHAiK1rs) and [evently](https://www.youtube.com/watch?v=zSMHol0qsy4)! They will be presented at WSDM'21." 
  - date: '2021-02-18'
    description: "Four Honours students joined Behavioral Data Science. Welcome [Frankie](../authors/lanqin-yuan/), [Duy](../authors/duy-khuu/), [Andrew](../authors/andrew-law/) and [Tom](../authors/thomas-willingham/)!"
  - date: '2021-03-03'
    description: "[Pio Calderon](../authors/pio-calderon/) joins the group. He starts his PhD studying cross-platform partially observed information spread, local influencers and popularity on social media. Welcome, Pio!"
  - date: '2021-03-29'
    description: " :page_facing_up: [Andrei](../authors/ma-rizoiu/)'s paper [Using Hawkes Processes to model imported and local malaria cases in near-elimination settings](https://journals.plos.org/ploscompbiol/article?id=10.1371/journal.pcbi.1008830) (together with collaborators at the Imperical College of London) just got accepted in [PLOS Computational Biology](https://journals.plos.org/ploscompbiol/)."
  - date: '2021-03-31'
    description: " :page_facing_up: The paper [Evolution of diversity and dominance of companies in online activity](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0249993) by economists and evolutionary biologists at UNSW, and [Andrei](../authors/ma-rizoiu/) as senior author just got accepted in [PLOS ONE](https://journals.plos.org/plosone/). This concludes a project in the making since July 2016 (almost 5 years!)."
  - date: '2021-04-29'
    description: " The [Conversation just published an article](https://theconversation.com/we-spent-six-years-scouring-billions-of-links-and-found-the-web-is-both-expanding-and-shrinking-159215) covering our PLOS ONE paper on the [evolution of diversity and dominance](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0249993). The [UTS](https://www.uts.edu.au/news/media-contacts) and [UNSW](https://newsroom.unsw.edu.au/contact) newsrooms also covered the work in a [press release](https://www.first5000.com.au/blog/internet-category-killers-significantly-reducing-online-diversity/)."
  - date: '2021-07-03'
    description: " :page_facing_up: The paper [Skill-driven recommendations for job transition pathways](https://dx.plos.org/10.1371/journal.pone.0254722) by [Nik](../authors/nik-dawson/) and [Andrei](../authors/ma-rizoiu/) just got accepted in [PLOS ONE](https://journals.plos.org/plosone/). Perfect timing for a labour transitions solution, given the new lockdowns!"
  - date: '2021-08-13'
    description: "The Behavioral Data Science lab has a [**PhD opportunity available**](/extra/phdopportunity). If you are interested in working with us, please [get in touch](/contact)."
  - date: '2021-08-05'
    description: " The [Conversation just published an article](https://theconversation.com/how-ai-can-help-choose-your-next-career-and-stay-ahead-of-automation-164162) covering our PLOS ONE paper on how [AI can help choose your next career](https://dx.plos.org/10.1371/journal.pone.0254722). The research also made the headlines of the [World Economic Forum](https://www.weforum.org/agenda/2021/08/ai-career-move-job-employment/?utm_source=feedburner&utm_medium=feed&utm_campaign=Feed%3A+inside-the-world-economic-forum+%28Inside+The+World+Economic+Forum%29), [LinkedIn News Australia](https://www.linkedin.com/news/story/want-to-pivot-careers-ask-ai-4483913/), [The Mandarin](https://www.themandarin.com.au/165019-skill-driven-recommendations-for-job-transition-pathways/) and [Phys.org](https://phys.org/news/2021-08-careers-ai-tool.html)."
  - date: '2021-09-09'
    description: " [Andrei](../authors/ma-rizoiu/) presented at the [European Communication Conference (ECREA’21)](https://www.ecrea2021.eu/) in the session “Coordinated Inauthentic Behaviour in Social Media: New Methods and Findings”, the paper “Discovering the Strategies of Coordinated Disinformation via Hawkes Intensity Processes“. [Check the blogpost and recording here](/theme2_content/coordinated_disinfo_hawkes/)."
  - date: '2021-09-23'
    description: "[Frankie Yuan](../authors/lanqin-yuan/) started today his PhD on building detection models for online problematic speech (disinformation, misinformation, and hate speech). Welcome, Frankie!"
  - date: '2021-11-16'
    description: " :page_facing_up: The paper [Slipping to the Extreme: A Mixed Method to Explain How Extreme Opinions Infiltrate Online Discussions](https://arxiv.org/abs/2109.00302) by [Quyu](../authors/quyu-kong/) and [Andrei](../authors/ma-rizoiu/) and collaborators from the [School of Communication @UTS](https://www.uts.edu.au/study/communication/about-communication/welcome-school-communication) just got accepted in [16th International Conference on Web and Social Media (ICWSM'22)](https://www.icwsm.org/2022/index.html/)."
  - date: '2022-02-21'
    description: "[Daniela Elia](../authors/daniela-elia/) started today her PhD on augmenting skill and occupational ontologies with the demand on the employer's side. Welcome, Daniela!"
  - date: '2022-02-28'
    description: "[Amelie Girard](../authors/amelie-girard/) started today her PhD on how to bridge the gap between ML prediction, and explaining decisions (say in a marketing, consulting or HR context). Welcome, Amelie!"
  - date: '2022-04-18'
    description: " :page_facing_up: The paper “Skills Taught vs Skills Sought: Using Skills Analytics to Identify the Gaps between Curriculum and Job Markets”, together with [Connected Intelligence Centre](https://cic.uts.edu.au/) (CIC) colleagues [Alireza Ahadi](https://profiles.uts.edu.au/Alireza.Ahadi), [Kirsty Kitto](https://profiles.uts.edu.au/Kirsty.Kitto), [Kaska Musial](https://profiles.uts.edu.au/Katarzyna.Musial-Gabrys) was accepted in [Educational Data Mining 2022](https://edm2022.webspace.durham.ac.uk/)."
  - date: '2022-05-04'
    description: " Check-out [the presentation video](https://www.youtube.com/watch?v=HwFq3ywanp4) for our paper [Slipping to the Extreme: A Mixed Method to Explain How Extreme Opinions Infiltrate Online Discussions](https://arxiv.org/abs/2109.00302), soon to be presented at [ICWSM'22](https://www.icwsm.org/2022/index.html/)."
  - date: '2022-07-06'
    description: "[**Two 1-Year Postdoc available**](/extra/PostDoc_openning.pdf) in detecting and modelling mis-/dis-information spread. If you are interested in working with us, please [get in touch](/contact)."
  - date: '2022-07-12'
    description: "Join us in fighting online misinformation! We have multiple [**funded PhD positions available**](/extra/PhD_misinformation.pdf) for (computational) social scientists, applied statisticians and machine learning & data scientists. [Get in touch](/contact)."
  - date: '2022-07-27'
    description: "[Andrei](/authors/ma-rizoiu/) was interviewed by SAGE Research Methods for the [Doing Online Research](https://uk.sagepub.com/en-gb/eur/sage-research-methods-doing-research-online) case study collection. Check out the [blogpost and video](/blogpost/sage-research-methods-online-problematic-content/)"
  - date: '2022-09-19'
    description: "[Andrei](/authors/ma-rizoiu/) published a [The Conversation piece](https://theconversation.com/a-huge-linkedin-study-just-showed-which-connections-are-better-when-searching-for-a-job-190428) on [LinkedIn's experiment](https://www.science.org/doi/10.1126/science.abl4476) linking weak ties to labour modiblity, and gave radio interviews on [Radio Adelaide](theme3_content/linkedin_experiment/) and [ABC Tasmania](https://www.abc.net.au/hobart/programs/mornings/mornings/14051708)."
  - date: '2022-11-23'
    description: " [Rohit](../authors/rohit-ram/) and [Andrei](../authors/ma-rizoiu/) presented at the [Defence Human Sciences Symposium 2022 (DHSS'22)](https://www.dst.defence.gov.au/event/defence-human-sciences-symposium-2022) in the session “Human sciences in the Grey Zone”, the talk “Data-Driven Ideology
Detection: A case study of far-right extremism“. [Check the recording here](https://www.youtube.com/watch?v=csWMgU7R52Q)."
  - date: '2022-11-26'
    description: " :page_facing_up: The paper [Interval-censored Hawkes processes](https://jmlr.org/papers/v23/21-0917.html) by [Andrei](../authors/ma-rizoiu/), [Alex](../authors/alexander-soen/) and [Pio](../authors/pio-calderon/), together with colleagues from ANU and Google, just got accepted in the flagship theoretical Machine Learning journal [Journal of Machine Learning Journal](https://www.jmlr.org/)."
  - date: '2023-01-13'
    description: " :page_facing_up: The paper [Predicting Relationship Labels and Individual Personality Traits from Telecommunication History in Social Networks using Hawkes Processes](https://ieeexplore.ieee.org/document/10024293) by [Andrei](../authors/ma-rizoiu/) together with colleagues from Wrocław University of Science and Technology (Poland) and University of California Los Angeles, just got accepted in impactful Computer Science journal [IEEE Access](https://ieeexplore.ieee.org/) ([Google H5=200](https://scholar.google.com/citations?view_op=top_venues&hl=en&vq=eng_enggeneral))."
  - date: '2023-01-26'
    description: " :page_facing_up: The paper 'Interval-censored Transformer Hawkes: Detecting Information Operations using the Reaction of Social Systems' by [Quyu](../authors/quyu-kong/), [Pio](../authors/pio-calderon/), [Rohit](../authors/rohit-ram/) and [Andrei](../authors/ma-rizoiu/) together with a colleague from [Olga Boichak](https://www.sydney.edu.au/arts/about/our-people/academic-staff/olga-boichak.html) from the University of Sydney, just got accepted in [The Web Conference 2023](https://www2023.thewebconf.org/) (WWW), the flagship conference of Web Research."
  - date: '2023-02-27'
    description: "Detecting online radicalisation early could help prevent far-right ideology-motivated (and potentially violent) activity! Check out [Rohit](../authors/rohit-ram/)'s and [Andrei](../authors/ma-rizoiu/)'s article that just appeared in The Conversation: [Can ideology-detecting algorithms catch online extremism before it takes hold?](https://theconversation.com/can-ideology-detecting-algorithms-catch-online-extremism-before-it-takes-hold-200629). See the full [research blog](../theme1_content/ideology_detection/)!"
  - date: '2023-04-19'
    description: " :page_facing_up: The paper 'Riding information crises: The performance of far-right Twitter users in Australia during the 2019-20 bushfires and the COVID-19 pandemic' by [Andrei](../authors/ma-rizoiu/) together with digital communication collaborators [Francesco Bailo](https://www.sydney.edu.au/arts/about/our-people/academic-staff/francesco-bailo.html?apcode=ACADPROFILE300808) and [Amelia Johns](https://profiles.uts.edu.au/Amelia.Johns) just got accepted in the prestigious journal [Information, Communication & Society](https://www.tandfonline.com/toc/rics20/current)."
  - date: '2023-07-13'
    description: " Huge congrats to [Dima](../authors/dima-galat/) for getting his paper paper 'Enhancing Biomedical Text Summarization and Question-Answering: On the Utility of Domain-Specific Pre-Training' accepted in the [BioASQ workshop](http://bioasq.org/workshop2023), collocated with the [CLEF 2023 conference](https://clef2023.clef-initiative.eu/). Enjoy Thessaloniki, Dima!"
  - date: '2023-07-16'
    description: " :page_facing_up: The paper [Opinion Market Model: Stemming Far-Right Opinion Spread using Positive Interventions](https://arxiv.org/abs/2208.06620) by [Pio](../authors/pio-calderon/), [Rohit](../authors/rohit-ram) and [Andrei](../authors/ma-rizoiu/) just got accepted in the [18th International Conference on Web and Social Media (ICWSM'24)](https://aaai.org/conference/icwsm/). See the full [research blog](../theme2_content/omm/)!"
  - date: '2023-08-04'
    description: " :trophy: [Andrei](../authors/ma-rizoiu/) is honoured to be a finalist for the [Australian Defence Industry Awards 2023, category Academic of the Year](https://www.defenceconnect.com.au/australian-defence-industry-awards/winners/2023-winners-and-finalists), for his work on detecting and counting the spread of mis- and disinformation and its weaponized counterparts – information and influence operations."
  - date: '2023-08-14'
    description: " :page_facing_up: Our work about the moderating harmful online content and the effectiveness of the EU Digital Services Act was published in the prestigious Proceedings of the National Academy of Sciences (PNAS). Checkout the paper [The effectiveness of moderating harmful online content](https://www.pnas.org/doi/10.1073/pnas.2307360120) by [Philipp Schneider](https://www.linkedin.com/in/-philipp-schneider) (from EPFL) and [Andrei](../authors/ma-rizoiu/)."
  - date: '2023-08-25'
    description: " :page_facing_up: The paper [Inclusive and Explainable AI Systems: A Systematic Literature Review]() by [Amelie](../authors/amelie-girard/), [Andrei](../authors/ma-rizoiu/) and colleagues from [Data61 CSIRO](https://www.csiro.au/en/about/people/business-units/data61) was accepted with the [Hawaii International Conference on System Sciences (HICSS'23)](https://hicss.hawaii.edu/). Good job, Amelie!"
  - date: '2023-09-04'
    description: " :page_facing_up: The paper [The Science of Startups: The Impact of Founder Personalities on Company Success](https://www.nature.com/articles/s41598-023-41980-y) by [Paul McCarthy](https://www.unsw.edu.au/staff/paul-mccarthy), [Elaine Gong](../authors/xian-gong/), [Andrei](../authors/ma-rizoiu/) and colleagues from the University of Oxford and University of Melbourne was accepted by [Nature's Scientific Reports](https://www.nature.com/srep/). The paper unveils novel insights into the factors that contribute to startup success."   
  - date: '2023-09-21'
    description: " :trophy: [Andrei](../authors/ma-rizoiu/) was awarded the top [Defence Industry Award 2023](https://www.defenceconnect.com.au/australian-defence-industry-awards/winners/2023-winners-and-finalists?utm_source=defenceconnect.com.au&utm_medium=editorial&utm_campaign=adia2023winnersstorywinnerslist&utm_term=ADIA2023), for the Academic of the Year and the Excellence Award. See [media coverage](https://www.uts.edu.au/news/tech-design/uts-researcher-wins-top-defence-industry-award). Not too bad!"
  - date: '2023-10-12'
    description: " :page_facing_up: The paper [The Innovation-to-Occupations Ontology: Linking Business Transformation Initiatives to Occupations and Skills]() by [Daniela](../authors/daniela-elia/), [Andrei](../authors/ma-rizoiu/) and colleagues from the [UTS Data Science Institute](https://www.uts.edu.au/data-science-institute) and from [Data61 CSIRO](https://www.csiro.au/en/about/people/business-units/data61) was accepted with the [Australasian Conference on Information Systems (ACIS'23)](https://acis.aaisnet.org/). Good job, Daniela!"
  - date: '2023-10-18'
    description: " :page_facing_up: The paper [Transfer learning for hate speech detection in social media](https://link.springer.com/article/10.1007/s42001-023-00224-9) by [Frankie](../authors/lanqin-yuan/), [Andrei](../authors/ma-rizoiu/) and colleagues from the Australian National University was published in the [Journal of Computational Social Science](https://www.springer.com/journal/42001). Congrats, Frankie!"
  - date: '2023-12-06'
    description: " :page_facing_up: The paper [Conspiracy, Misinformation, Radicalisation: Understanding the online
pathway to indoctrination and opportunities for intervention](https://journals.sagepub.com/doi/10.1177/14407833241231756) by [Emily](../authors/emily-booth/), [Jooyoung](../authors/jooyoung-lee/), [Andrei](../authors/ma-rizoiu/) and colleagues from the University of California Berkeley was published in the [Journal of Sociology](https://journals.sagepub.com/doi/10.1177/14407833241231756). Great job!"
  - date: '2024-02-01'
    description: " :page_facing_up: The paper [Harmony in the Australian Domain Space](https://dl.acm.org/doi/10.1145/3614419.3643998) by [Elaine](../authors/xian-gong/), [Andrei](../authors/ma-rizoiu/) and colleagues from the University of New South Wales and Università degli Studi di Milano, Italy, was accepted for publication in [WEBSCI '24: Proceedings of the 16th ACM Web Science Conference](https://websci24.org/). Congrats, Elaine!"
  - date: '2024-05-09'
    description: " [Lin](../authors/lin-tian) joined the Behavioral Data Science as a Research Associate (postdoc). Welcome Lin!"
  - date: '2024-05-27'
    description: " :page_facing_up: The paper [What Drives Online Popularity: Author, Content or Sharers? Estimating Spread Dynamics with Bayesian Mixture Hawkes](https://arxiv.org/pdf/2406.03390) by [Pio](../authors/pio-calderon/) and [Andrei](../authors/ma-rizoiu/) was accepted at [ECML-PKDD'24: Proceedings of the European Conference on Machine Learning and Data Mining](https://ecmlpkdd.org/). Safe travels to Vilnius, Lithuania!"
  - date: '2024-06-12'
    description: " :trophy: What a fabulous night at the Defence and National Security Workforce Awards, celebrating [Emily](../authors/emily-booth/)'s successes and recognition. Emily was a finalist in the [category Best Female Technical Specialist under 35](https://www.defenceconnect.com.au/defence-national-security-workforce-awards/winners/2024-winners-and-finalists), for her work on understanding and countering online misinformation! It was so good having UTS' [Vice-Chancellor Andrew Parfitt](https://au.linkedin.com/in/andrew-parfitt-577284226?trk=public_post-text) and [Pro-Vice-Chancellor Research Chris Turney](https://au.linkedin.com/in/profchristurney?trk=public_post-text) cheer with us!! Check out [some photos from the night](https://www.linkedin.com/feed/update/urn:li:activity:7206643709914861569/)."
  - date: '2024-07-21'
    description: " :page_facing_up: The paper [Generalizing hate speech detection using multi-task learning: A case study of political public figures](https://doi.org/10.1016/j.csl.2024.101690) by [Frankie](../authors/lanqin-yuan/) and [Andrei](../authors/ma-rizoiu/) was published in the journal [Computer Speech & Language](https://www.sciencedirect.com/journal/computer-speech-and-language). Congrats!"
  - date: '2024-08-06'
    description: " :page_facing_up: The paper [Empirically measuring online social influence](https://epjdatascience.springeropen.com/articles/10.1140/epjds/s13688-024-00492-z) by [Rohit](../authors/rohit-ram/) and [Andrei](../authors/ma-rizoiu/) was published in the journal [EPJ Data Science](https://epjdatascience.springeropen.com/). Great job!"   
  - date: '2024-09-04'
    description: " :trophy: [Andrei](../authors/ma-rizoiu/) was a finalist for the 2024 Department of Defence Eureka Prize for Outstanding Science in Safeguarding Australia! The [Australian Museum Eureka Prizes](https://australian.museum/get-involved/eureka-prizes/) ceremony was held at Sydney Town Hall, recognizing Andrei's groundbreaking work on detecting harmful information online while preserving free speech. This follows his win of the Excellence Award and Academic of the Year at the 2023 Australian Defence Industry Awards. Congrats, but next time make sure you actually win it!"
  - date: '2024-11-16'
    description: " :page_facing_up: The paper [Detecting Extreme Ideologies in Shifting Landscapes: an Automatic & Context-Agnostic Approach](http://arxiv.org/abs/2208.04097) by [Rohit](../authors/rohit-ram/) and [Andrei](../authors/ma-rizoiu/) together with collaborators from Flinders University and DSTG just got accepted at [ICWSM'25](https://www.icwsm.org/2025/). Their work offers a practical pipeline for detecting ideological signals in social media! Looking forward to presenting in beautiful Copenhagen!"
  - date: '2025-01-21'
    description: " :page_facing_up: The paper [Before It's Too Late: A State Space Model for the Early Prediction of Misinformation and Disinformation Engagement](http://arxiv.org/abs/2502.02943) by [Lin](../authors/lin-tian/), [Emily](../authors/emily-booth/) and [Andrei](../authors/ma-rizoiu/) was accepted at [The Web Conference 2025](https://www2025.thewebconf.org/) (WWW) in the [Web4Good track](https://www2025.thewebconf.org/web4good). Check out the [interactive dashboard](https://ic-mamba.behavioral-ds.science) showcasing the approach to early detection of problematic content!"
  - date: '2025-01-21'
    description: " :page_facing_up: The paper [Behavioral Homophily in Social Media via Inverse Reinforcement Learning: A Reddit Case Study](http://arxiv.org/abs/2502.02943) by [Frankie](../authors/lanqin-yuan/), [Philipp Schneider](https://www.linkedin.com/in/-philipp-schneider) and [Andrei](../authors/ma-rizoiu/) was accepted at [The Web Conference 2025](https://www2025.thewebconf.org/) (WWW). This study uses inverse reinforcement learning to uncover how user behaviors can reveal connection patterns that traditional topic analysis misses!"
  - date: '2025-01-30'
    description: " :page_facing_up: The paper [Linking Across Data Granularity: Fitting Multivariate Hawkes Processes to Partially Interval-Censored Data](https://ieeexplore.ieee.org/document/10750824/) by [Pio](../authors/pio-calderon/), [Alex](../authors/alexander-soen/) and [Andrei](../authors/ma-rizoiu/) was published in the prestigious [IEEE Transactions on Computational Social Systems](https://ieeexplore.ieee.org/xpl/RecentIssue.jsp?punumber=6570650). This work advances how we can model data with varying time granularity!"
  - date: '2025-03-19'
    description: "[Huixiang Fu](../authors/huixiang-fu/) started her PhD, focusing on detecting and tackling misinformation using advanced machine learning techniques. Welcome, Huixiang!"
  - date: '2025-04-10'
    description: " :mortar_board: Congratulations to [Pio Calderon](../authors/pio-calderon/) who successfully defended his PhD thesis on 'Modeling the Online Spread of Ideas in a Finite Attention Environment' in the Behavioral Data Science lab! During his time with us, Pio published in top venues including ECML-PKDD, ICWSM, IEEE TCSS, and JMLR. His innovative work on the Opinion Market Model and Bayesian Mixture Hawkes processes has significantly advanced our understanding of online information dynamics. We're proud of your achievements, Pio!"
  - date: '2025-05-02'
    description: " :trophy: Our paper [Behavioral Homophily in Social Media via Inverse Reinforcement Learning: A Reddit Case Study](http://arxiv.org/abs/2502.02943) by [Frankie](../authors/lanqin-yuan/), [Philipp](https://www.linkedin.com/in/-philipp-schneider) and [Andrei](../authors/ma-rizoiu/) was awarded the prestigious **Best Paper Award** at [The Web Conference 2025](https://www2025.thewebconf.org/) (WWW'25)! This groundbreaking work uses inverse reinforcement learning to uncover connection patterns that traditional topic analysis overlooks, demonstrating how user behaviors reveal deeper social structures. The award was presented during the closing ceremony in Sydney, where Andrei also served on the local organizing committee. So well done, Frankie and Philipp!"
  - date: '2025-05-02'
    description: "[Andrei](../authors/ma-rizoiu/) successfully led the volunteer program for [The Web Conference 2025](https://www2025.thewebconf.org/) in Sydney, coordinating a team of 55 students who supported this premier international event. As Volunteer Chair, Andrei managed everything from audio-visual systems to registration support, contributing to the success of WWW'25 which attracted ~1,300 delegates."
  - date: '2025-05-09'
    description: "Our WWW'25 best paper award research gained international attention! The Conversation article '[Some Reddit users just love to disagree, new AI-powered troll-spotting algorithm finds](https://theconversation.com/some-reddit-users-just-love-to-disagree-new-ai-powered-troll-spotting-algorithm-finds-255879)' reached 13.8k views in its first week and was translated into Portuguese for the Brazilian edition."
  - date: '2025-05-15'
    description: " :trophy: Congratulations to [Emily](../authors/emily-booth/) for being a finalist in the 'Best Female Technical Specialist under 35' category at the [Defence and National Security Workforce Awards 2025](https://www.defenceconnect.com.au/defence-national-security-workforce-awards/winners/2025-winners-and-finalists)! Emily was recognized for her groundbreaking work on understanding and countering online misinformation."
  - date: '2025-06-26'
    description: " :page_facing_up: [Rohit](../authors/rohit-ram/) presented the paper 'Practical Guidelines for Ideology Detection Pipelines and Psychosocial Applications' at [ICWSM 2025](https://www.icwsm.org/2025/) in Copenhagen. Great job, Rohit, together with collaborators [Emma Thomas](https://www.flinders.edu.au/people/emma.thomas) and [David Kernot](https://www.parsingscience.org/2018/05/15/david-kernot/)!"
  - date: '2025-07-01'
    description: " :page_facing_up: The paper [Misinformation is not about Bad Facts: An Analysis of the Production and Consumption of Fringe Content](https://epjdatascience.springeropen.com/articles/10.1140/epjds/s13688-024-00493-0) by [Jooyoung](../authors/jooyoung-lee/), [Emily](../authors/emily-booth/), [Andrei](../authors/ma-rizoiu/) and colleagues from UC Berkeley was published in [EPJ Data Science](https://epjdatascience.springeropen.com/). This groundbreaking research reveals that misinformation is more about community belonging than factual accuracy!"
  - date: '2025-07-09'
    description: "Our startup personality research made headlines in [The Economist's Bartleby column](https://www.economist.com/business/2025/06/30/are-startup-founders-different)! The piece highlights our study of 21,000 global startups, revealing that successful founders exhibit distinct personality traits and that diverse founder teams significantly increase success chances."
  - date: '2025-07-19'
    description: " :wave: [Andrew](../authors/andrew-savchenko/) started his Masters by research with [Andrei](../authors/ma-rizoiu/) and [Emily](../authors/emily-booth/) as supervisors. Welcome, Andrew!"
  - date: '2025-07-31'
    description: " :trophy: [Andrei](../authors/ma-rizoiu/) is a finalist for the [2025 Australian Museum Eureka Prizes](https://australian.museum/get-involved/eureka-prizes/2025-eureka-prizes-finalists/) in the Department of Defence category for Outstanding Science in Safeguarding Australia! This recognition celebrates his innovative work on ethical AI systems that detect misinformation while protecting democratic values."
  - date: '2025-08-05'
    description: " :page_facing_up: The paper [X-Troll: eXplainable Detection of State-Sponsored Information Operations Agents](https://arxiv.org/abs/placeholder) by [Lin](../authors/lin-tian/), [Andrei](../authors/ma-rizoiu/) and collaborators from RMIT and DSTG was accepted for publication at [CIKM'25](https://cikm2025.org/)! X-Troll integrates adapter-based models with expert linguistic knowledge to detect state-sponsored information operations agents, while providing human-readable explanations of the used manipulation strategies. Enjoy Seoul, Korea, Lin!"
  - date: '2025-09-01'
    description: " :wave: [Kevin](../authors/kevin-zheng) started his PhD with us, after securing the USyd's University Medal. Huge congrats, and welcome Kevin!"
  - date: '2025-09-02'
    description: " :page_facing_up: Congrats to [Lin](../authors/lin-tian) for her very first The Conversation article [How we tricked AI chatbots into creating misinformation, despite ‘safety’ measures](https://theconversation.com/how-we-tricked-ai-chatbots-into-creating-misinformation-despite-safety-measures-264184). The article stirred some online discussions, being covered by [LinkedIn News](https://www.linkedin.com/news/story/ai-can-be-duped-to-create-fake-news-6530740/)."
  - date: '2025-09-11'
    description: " [Andrei](../authors/ma-rizoiu) participated in the UTS Global Game Changers panel “Too young to scroll?” discussing the Australia’s social media ban for under 16s to start in Dec’25. He showcased the evidence that shows that social media is harmful for children’s and teens’ development, and the addictive nature of social media design. Check out the [recording of the panel](https://youtu.be/_epCK1vvGq8?si=EMnhJnYTw6LPRpeO) and some [photos of the event](https://oscarcolmanweddings.pic-time.com/-2025utsggcgreathall/gallery?inviteptoken2=AAAAAOoAAADO0rSDjpj7Pyz6hXGVR16eXlel)"
  - date: '2025-09-25'
    description: " :page_facing_up: The paper [Cosmos 1.0: a multidimensional map of the emerging technology frontier](http://arxiv.org/abs/2505.10591) by [Elaine](../authors/xian-gong/), [Andrei](../authors/ma-rizoiu/) and collaborators was accepted in the prestigious [Nature Scientific Data](https://www.nature.com/sdata/)! Nature's Scientific Data is among the [Top 20 Multidisciplinary Science Journals](https://scholar.google.com/citations?view_op=top_venues&hl=en&vq=bio_biogeneral) in the world.  It is arguably the highest impact data journal in the world and of [similar impact](https://scholar.google.com/citations?hl=en&view_op=search_venues&vq=data+OR+%22Nature+machine%22+OR+%22Nature+Human%22&btnG=) to Nature Human Behaviour and Nature Machine Intelligence. Well done, Elaine!"
  - date: '2025-09-29'
    description: " :movie_camera: [Andrei](../authors/ma-rizoiu/) filmed with [Dr Karl](https://drkarl.com/) two \"Shirtloads of Science\" vodcast episodes. We talked about what is misinformation (spoiler alert: not an information problem, but a human and social problem), the impact on our society, the addictive nature of social media, the social media ban for under 16s, how misinformation leads to radicalisation and many other topics. Check out [Episode 1](https://www.youtube.com/watch?v=5bWlc8RCShA) and [Episode 2](https://www.youtube.com/watch?v=m8fFc_1QcZ8)"
  - date: '2025-11-10'
    description: " :wave: [Majid Akhtar](https://scholar.google.com/citations?user=s0S12tUAAAAJ&hl=en) joins our group as a Postdoctoral Research Associate focusing on countering disinformation campaigns. Majid completed his PhD at UNSW Sydney in Computer Science and Engineering, where he specialised in cybersecurity with a focus on detecting social media manipulations, fake news detection, and bot detection. Welcome, Majid!"
  - date: '2025-10-28'
    description: " :mortar_board: [Elaine Gong](../authors/xian-gong/) submitted her PhD thesis. Elaine did an Industrial Doctorate Program (IDP) thesis, working midway between industry and academia. Her research focused, among other, on personality prediction based on social media text and learning the relationship between personality and engagement in job market. Congrats Elaine!"
  - date: '2025-10-09'
    description: " :wave: [Artur Grigorev](https://arturgrigorev.github.io/) joined our group as a Postdoctoral Research Fellow working on quantifying and closing skill gaps for local governments. Artur completed his PhD in Information Technology at UTS, where his research focused on traffic incident analysis including duration and impact prediction, severity classification, and risk forecasting using deep learning and traffic simulation. Welcome, Artur!"
  - date: '2025-11-08'
    description: " :page_facing_up: The paper [Estimating Online Influence Needs Causal Modeling: Counterfactual Analysis of Misinformation Engagement on Social Media](https://arxiv.org/pdf/2505.19355) by [Lin](../authors/lin-tian/) and [Andrei](../authors/ma-rizoiu/) was accepted at the [2026 AAAI Conference on Artificial Intelligence (AAAI'26)](https://aaai.org/conference/aaai/aaai-26/)! The work introduces CITRUS, a novel joint treatment-outcome framework that leverages existing sequential models to understand how external signals—search trends, news coverage, influencer activity—trigger misinformation engagement. Great work, Lin!"
  - date: '2025-11-10'
    description: " :microphone: [Andrei](../authors/ma-rizoiu/) gave a presentation at Singapore's [CATOS Online Safety Thematic Seminar Series](https://www.catos.sg/seminarseries) on the Australian misinformation environment. The presentation engaged participants from academia, government and industry, sharing insights from our research on detecting and countering misinformation campaigns."
  - date: '2025-12-02'
    description: " :newspaper: [Lin](../authors/lin-tian/) and [Andrei](../authors/ma-rizoiu/) published a new article in The Conversation: [What are small language models and how do they differ from large ones?](https://theconversation.com/what-are-small-language-models-and-how-do-they-differ-from-large-ones-269103) exploring the trade-offs between Large Language Models (LLMs) and Small Language Models (SLMs). While LLMs can write poetry but require cloud computing with privacy concerns, SLMs excel at specialised tasks and can run locally on home PCs or embedded systems like self-driving cars."
  - date: '2025-12-12'
    description: " :mortar_board: [Frankie](../authors/lanqin-yuan/) submitted his PhD thesis on identifying problematic content in online social media! His research advances our understanding of hate speech detection through transfer learning and multi-task learning approaches, while introducing novel behaviour-based methods using inverse reinforcement learning to detect malicious actors. This is a big milestone - congrats, Frankie!"
  - date: '2025-12-12'
    description: " :mortar_board: Congratulations to [Rohit](../authors/rohit-ram/) who has been conferred his PhD! Huge congrats, Dr Ram! We will be there for the graduation ceremony, we want to come and celebrate this fantastic achievement!"
  - date: '2026-01-14'
    description: " :page_facing_up: The paper [DREAMS: A Social Exchange Theory-Informed Modeling of Misinformation Engagement on Social Media](https://www2026.thewebconf.org/) by [Lin](../authors/lin-tian/) and [Andrei](../authors/ma-rizoiu/) was accepted at [The Web Conference 2026 (WWW'26)](https://www2026.thewebconf.org/) in Dubai! DREAMS introduces a novel cross-platform framework that models misinformation engagement by integrating Social Exchange Theory with neural architectures. Acceptance rate: 20.1% (676/3370 submissions). Great work, Lin!"
